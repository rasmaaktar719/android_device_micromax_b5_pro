name: Build TWRP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04

    steps:
    - name: Checkout Device Tree
      uses: actions/checkout@v3
      with:
        path: device/micromax/b5_pro

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev

    - name: Install Repo Tool
      run: |
        mkdir ~/bin
        curl https://googleapis.com > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Initialize Minimal TWRP Source
      run: |
        mkdir twrp
        cd twrp
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        repo init --depth=1 -u https://github.com -b twrp-9.0
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: Move Device Tree to Source
      run: |
        mv device/micromax/b5_pro twrp/device/micromax/b5_pro

    - name: Building TWRP Image
      run: |
        cd twrp
        export ALLOW_MISSING_DEPENDENCIES=true
        source build/envsetup.sh
        lunch twrp_b5_pro-eng
        make recoveryimage -j$(nproc --all)

    - name: Upload TWRP Result
      uses: actions/upload-artifact@v3
      with:
        name: TWRP-B5-Pro-Image
        path: twrp/out/target/product/b5_pro/recovery.img
