name: Build TWRP

on:
  push:
   branches:
    -main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Device Tree
      uses: actions/checkout@v4
      with:
        path: twrp/device/micromax/b5_pro

    - name: Install Build Dependencies (Ubuntu Latest Fix)
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick libncurses6 libncurses-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 python-is-python3

    - name: Install Repo Tool
      run: |
        mkdir ~/bin
        curl https://googleapis.com > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Initialize Minimal TWRP Source (Full URL Fix)
      run: |
        cd twrp
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        # এখানে সম্পূর্ণ অফিশিয়াল গিটহাব সোর্স .git লিঙ্কটি যুক্ত করা হয়েছে
        repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_omni.git -b twrp-9.0
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: Building TWRP Image
      run: |
        cd twrp
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL=C
        source build/envsetup.sh
        lunch twrp_b5_pro-eng
        make recoveryimage -j$(nproc --all)

    - name: Upload TWRP Result
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-B5-Pro-Image
        path: twrp/out/target/product/b5_pro/recovery.img
